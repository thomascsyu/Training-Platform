services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet
        ${MONGO_ROOT_USER:+--username $$MONGO_ROOT_USER --password $$MONGO_ROOT_PASSWORD --authenticationDatabase admin}
        --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8080"
    volumes:
      - uploads_data:/app/uploads
    environment:
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
      DB_NAME: learnhub
      UPLOADS_DIR: /app/uploads
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@learnhub.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
      ADMIN2_EMAIL: ${ADMIN2_EMAIL:-admin2@learnhub.com}
      ADMIN2_PASSWORD: ${ADMIN2_PASSWORD:-change-me-admin2}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      REQUIRE_STRIPE_WEBHOOK_SECRET: ${REQUIRE_STRIPE_WEBHOOK_SECRET:-false}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@learnhub.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-LearnHub}
    depends_on:
      mongo:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:8080"
    environment:
      BACKEND_PROXY_URL: ${BACKEND_PROXY_URL:-http://api:8080}
    depends_on:
      - api

volumes:
  mongo_data:
  uploads_data:
